name: deploy quartz website with internationalisation

on:
  push:
    branches:
      - v4

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install dependencies
        run: npm install

      - name: build all languages
        run: |
          # format: "sourceFolder:langCode:outputPath"
          # 'root' tells the script to put files in the base directory
          langs=("en_GB:en:root" "fr_FR:fr:fr" "ja_JP:ja:ja")

          for entry in "${langs[@]}"; do
            IFS=':' read -r src lang_code dist <<< "$entry"

            echo "building $src (lang: $lang_code)"
            rm -rf .quartz-cache
            export QUARTZ_LANG="$lang_code"

            if [ "$dist" == "root" ]; then
              npx quartz build --directory "content/$src" --output "public"
            else
              npx quartz build --directory "content/$src" --output "public/$dist"
            fi
          done

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
